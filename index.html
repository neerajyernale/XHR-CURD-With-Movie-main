<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Movie CRUD With Mock API</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
        crossorigin="anonymous"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4 font-weight-bold">
                <i class="fa-solid fa-film text-primary"></i>
                Movie Management Dashboard
            </h1>
             <p class="text-muted">
                Manage your favourite movies using XHR CRUD operations
            </p>
        </div>
        <div class="row">
            <div class="col-md-3">
                <div class="card ">
                   <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            <i class="fa-solid fa-circle-plus"></i>
                            Add Movie You Liked
                        </h3>
                    </div>
                    <div class="card-body">
                        <form id="movieForm">
                            <div class="form-group">
                                <label
                                    for="title"
                                    class="font-weight-bold"
                                >
                                    Movie Title *
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="title"
                                    placeholder="Enter movie title"
                                    required
                                >
                            </div>
                             <div class="form-group">
                                <label
                                    for="url"
                                    class="font-weight-bold"
                                >
                                    Movie Poster URL *
                                </label>

                                <input
                                    type="url"
                                    class="form-control"
                                    id="url"
                                    placeholder="Enter image URL"
                                    required
                                >
                            </div>
                            <div class="form-group">
                                <label
                                    for="Description"
                                    class="font-weight-bold"
                                >
                                    Movie Description *
                                </label>

                                <textarea
                                    class="form-control"
                                    rows="4"
                                    id="Description"
                                    placeholder="Enter movie description"
                                    required
                                ></textarea>
                            </div>
                             <div class="form-group">
                                <label
                                    for="rating"
                                    class="font-weight-bold"
                                >
                                    Rating *
                                </label>
                                 <input
                                    type="number"
                                    id="rating"
                                    class="form-control"
                                    min="0"
                                    max="10"
                                    step="0.1"
                                    placeholder="Enter rating between 0 and 10"
                                    required
                                >
                            </div>
                            <button
                                type="submit"
                                class="btn btn-primary btn-block"
                                id="addBtn"
                            >
                                <i class="fa-solid fa-plus"></i>
                                Add Movie
                            </button>
                            <button
                                type="button"
                                class="btn btn-warning text-white btn-block mt-2 d-none"
                                id="updateBtn"
                            >
                                <i class="fa-solid fa-pen"></i>
                                Update Movie
                            </button>
                        </form>
                     </div>
                </div>
            </div>
            <div class="container">
                 <div class="row" id="movieContainer"></div>
            </div>
           
            
         </div>
    </div>

    <div class="spinner d-none" id="spinner">
         <div class="spinner-border text-danger" role="status"></div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="app.js"></script>


</body>
</html>
